# Stack di produzione Viapal sul server Docker di Sandro.
# Reverse proxy esterno: Traefik (configurato sul server).
# Dominio: viapal.e-den.it.
#
# Build context = . (repo root). Immagini taggate dal CI come ghcr.io/sandroden/viapal-{backend,frontend}:<tag>.
# Per deploy locale di test: `docker compose up --build`.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-viapal}
      POSTGRES_USER: ${POSTGRES_USER:-viapal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - viapal_postgres_data:/var/lib/postgresql/data
    networks:
      - viapal_internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - viapal_internal

  viapal-backend:
    image: ${BACKEND_IMAGE:-viapal-backend:local}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      ENV: production
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-viapal.e-den.it}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-viapal}
      POSTGRES_USER: ${POSTGRES_USER:-viapal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - viapal_media:/code/media
    networks:
      - viapal_internal

  viapal-frontend:
    image: ${FRONTEND_IMAGE:-viapal-frontend:local}
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - viapal-backend
    networks:
      - viapal_internal
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.viapal.rule=Host(`viapal.e-den.it`)"
      - "traefik.http.routers.viapal.entrypoints=websecure"
      - "traefik.http.routers.viapal.tls=true"
      - "traefik.http.routers.viapal.tls.certresolver=letsencrypt"
      - "traefik.http.services.viapal.loadbalancer.server.port=80"

volumes:
  viapal_postgres_data:
  viapal_media:

networks:
  viapal_internal:
    driver: bridge
  traefik:
    external: true
