# Stack di produzione Viapal sul server Docker di Sandro.
# Reverse proxy esterno: Traefik (rete `web` external).
# Routing per path: Traefik smista /admin, /static, /media, /api, /accounts
# al container `django`; il resto va a `quasar`.
#
# Postgres gira sull'HOST (non in Docker): il container raggiunge l'host
# via `host.docker.internal` grazie a `extra_hosts: host-gateway`.
# Settings di produzione iniettate via volume `./local.py` (vedi
# local.py.example).
# Volumi: bind-mount da ./data e ./logs.
#
# Build context = . (repo root). Immagini taggate dal CI come
# ghcr.io/sandroden/viapal-{backend,frontend}:<tag>.

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - db

  django:
    image: ${BACKEND_IMAGE:-viapal-backend:local}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      ENV: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    volumes:
      - ./local.py:/code/core/settings/local.py
      - ./data/media:/code/media
      - ./logs/uwsgi:/var/log/uwsgi
    networks:
      - db
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.viapal-django.rule=Host(`${HOST:-viapal.e-den.it}`) && PathPrefix(`/admin`, `/static`, `/media`, `/api`, `/accounts`)"
      - "traefik.http.routers.viapal-django.entrypoints=web-secured"
      - "traefik.http.routers.viapal-django.tls=true"
      - "traefik.http.routers.viapal-django.tls.certresolver=leresolver"
      - "traefik.http.routers.viapal-django.service=viapal-django"
      - "traefik.http.services.viapal-django.loadbalancer.server.port=8000"

  quasar:
    image: ${FRONTEND_IMAGE:-viapal-frontend:local}
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    volumes:
      - ./logs/nginx:/var/log/nginx
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.viapal-quasar.rule=Host(`${HOST:-viapal.e-den.it}`)"
      - "traefik.http.routers.viapal-quasar.entrypoints=web-secured"
      - "traefik.http.routers.viapal-quasar.tls=true"
      - "traefik.http.routers.viapal-quasar.tls.certresolver=leresolver"
      - "traefik.http.routers.viapal-quasar.service=viapal-quasar"
      - "traefik.http.services.viapal-quasar.loadbalancer.server.port=80"

networks:
  db:
  web:
    external: true
