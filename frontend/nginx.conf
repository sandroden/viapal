# Quasar PWA + reverse proxy verso backend Django
# Same-origin in produzione: il browser parla solo con questo nginx.

upstream viapal_backend {
    server viapal-backend:8000;
}

server {
    listen      80 default_server;
    server_name _;
    charset     utf-8;
    client_max_body_size 75M;

    root        /usr/share/nginx/html;
    access_log  /var/log/nginx/quasar-access.log;
    error_log   /var/log/nginx/quasar-errors.log;

    # API, admin, static e media -> Django
    location ~ ^/(api|admin|accounts|static|media)/ {
        proxy_pass http://viapal_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Service worker e manifest senza cache
    location ~* ^/(service-worker\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html =404;
    }
}
