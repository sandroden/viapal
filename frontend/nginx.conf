# Quasar PWA — solo asset statici.
# Routing per path (api/admin/static/media/accounts -> Django) e' gestito
# da Traefik a monte (vedi label nel docker-compose.yml).

server {
    listen      80 default_server;
    server_name _;
    charset     utf-8;
    client_max_body_size 75M;

    root        /usr/share/nginx/html;
    access_log  /var/log/nginx/quasar-access.log;
    error_log   /var/log/nginx/quasar-errors.log;

    # Service worker e manifest senza cache
    location ~* ^/(service-worker\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html =404;
    }
}
