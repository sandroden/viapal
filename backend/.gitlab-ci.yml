build_image:
  image: docker
  tags:
    - python


  variables:
    ENV: dev
    DOCKER_BUILDKIT: 1
    IMAGE_NAME: $REGISTRY_NAME/e-den/brainflow/brainflow-django:$CI_COMMIT_REF_SLUG


  script:
    - echo $REGISTRY_PASS | docker login -u $REGISTRY_USER --password-stdin $REGISTRY_NAME
    - docker build -t  $IMAGE_NAME .
    - docker push $IMAGE_NAME
